name: Build and Push Images

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-central-1
  ECR_FRONTEND: multi-cloud/frontend
  ECR_API: multi-cloud/api
  ECR_WORKER: multi-cloud/worker

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::075897120159:oidc-provider/oidc.eks.us-east-1.amazonaws.com/id/08A57EA9EA027D3F4BC1872C34974748
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build and push frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_FRONTEND:$IMAGE_TAG ./frontend
          docker push $REGISTRY/$ECR_FRONTEND:$IMAGE_TAG

      - name: Build and push api
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_API:$IMAGE_TAG ./api
          docker push $REGISTRY/$ECR_API:$IMAGE_TAG

      - name: Build and push worker
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_WORKER:$IMAGE_TAG ./worker
          docker push $REGISTRY/$ECR_WORKER:$IMAGE_TAG