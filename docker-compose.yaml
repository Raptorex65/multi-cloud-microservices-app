version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    container_name: mc-frontend
    ports:
      - "8081:80"
    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: mc-api
    environment:
      APP_ENV: local
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build:
      context: ./worker
    container_name: mc-worker
    environment:
      APP_ENV: local
    restart: unless-stopped